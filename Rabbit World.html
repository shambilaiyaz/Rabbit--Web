        <!-- KEYBOARD SHORTCUT PANEL (bottom right) -->
        <div class="shortcut-panel hidden" id="scPanel">
            <div class="sc-title">
                ⌨️ Keyboard Shortcuts
                <button
                    class="sc-hide-btn"
                    onclick="hideShortcuts()"
                    title="Hide"
                >
                    ✕
                </button>
            </div>
            <div class="sc-row">
                <span class="sc-key">R</span
                ><span class="sc-desc">Read for me / Stop Reading</span>
            </div>
            <div class="sc-row">
                <span class="sc-key">V</span
                ><span class="sc-desc">Go to Videos</span>
            </div>
            <div class="sc-row">
                <span class="sc-key">Q</span
                ><span class="sc-desc">Take Rabbit Quiz</span>
            </div>
            <div class="sc-row">
                <span class="sc-key">A</span
                ><span class="sc-desc">Go to AI</span>
            </div>
            <div class="sc-row">
                <span class="sc-key">H</span
                ><span class="sc-desc">Go to Home</span>
            </div>
            <div class="sc-row">
                <span class="sc-key">L</span><span class="sc-desc">Logout</span>
            </div>
            <div class="sc-row">
                <span class="sc-key">D</span
                ><span class="sc-desc">Toggle Dark Mode</span>
            </div>
        </div>
        <button
            class="sc-toggle-btn"
            id="scToggleBtn"
            onclick="showShortcuts()"
            style="display: block"
        >
            ⌨️ Shortcuts
        </button>
 
        <!-- TOAST NOTIFICATION -->
        <div class="sc-toast" id="scToast"></div>
 
        <!-- SHARE MODAL -->
        <div class="share-modal" id="shareModal">
            <div class="share-content">
                <button class="close-modal" onclick="closeShareModal()">
                    ✕
                </button>
                <h3>🎉 Share Your Score!</h3>
                <div class="share-preview">
                    <h4>🐰 Rabbit Quiz Results</h4>
                    <div class="score" id="shareScore">5/5</div>
                    <p id="shareMessage">Perfect! You are a Rabbit Expert!</p>
                </div>
                <div class="share-buttons">
                    <button
                        class="share-btn twitter"
                        onclick="shareToTwitter()"
                    >
                        🐦 Twitter
                    </button>
                    <button
                        class="share-btn facebook"
                        onclick="shareToFacebook()"
                    >
                        📘 Facebook
                    </button>
                    <button
                        class="share-btn whatsapp"
                        onclick="shareToWhatsApp()"
                    >
                        💬 WhatsApp
                    </button>
                    <button class="share-btn copy" onclick="copyShareText()">
                        📋 Copy Text
                    </button>
                </div>
            </div>
        </div>
 
        <header>
            <div class="logo">🐰 <span>Rabbit</span> World</div>
            <div class="header-controls">
                <div class="lang-btns">
                    <button class="lang-btn active" onclick="setLang('en', this)">
                        EN
                    </button>
                    <button class="lang-btn" onclick="setLang('bn', this)">
                        বাংলা
                    </button>
                </div>
                <button
                    class="theme-toggle"
                    onclick="toggleTheme()"
                    id="themeToggle"
                    title="Toggle Dark Mode"
                >
                    🌙
                </button>
            </div>
        </header>
 
        <!-- PAGE: LOGIN -->
        <div id="page-login">
            <div class="card">
                <h2>🐰 Welcome to Tamim Ashraf's Rabbit World!</h2>
                <p class="sub">
                    Please login to explore the wonderful world of rabbits
                </p>
 
                <div class="input-group">
                    <label>Username</label>
                    <input
                        id="inp-username"
                        type="text"
                        placeholder="Enter your username..."
                    />
                </div>
 
                <div class="input-group">
                    <label>Email</label>
                    <input
                        id="inp-email"
                        type="email"
                        placeholder="Enter your email..."
                    />
                </div>
 
                    <div id="learn-section" style="display: none;">
                    <p class="sub">
                        Are you here to learn about Rabbit?
                    </p>
                    <div class="btn-row" style="gap: 10px; margin-top: 10px;">
                        <button class="btn btn-primary" type="button" onclick="chooseLearnAnswer('yes')">
                            Yes
                        </button>
                        <button class="btn btn-secondary" type="button" onclick="chooseLearnAnswer('no')">
                            No
                        </button>
                    </div>
                    <div id="learn-response" style="display: none; margin-top: 14px;">
                        <p id="learn-response-text" class="sub"></p>
                        <button id="learn-ok-button" class="btn btn-primary" type="button" onclick="confirmLearnAnswer()" style="display: none; margin-top: 10px;">
                            OK
                        </button>
                    </div>
                </div>
 
                <div class="checkbox-group">
                    <input type="checkbox" id="remember-me" />
                    <label for="remember-me">Remember Me</label>
                </div>
 
                <p id="login-error" class="error-msg"></p>
                <p id="login-success" class="success-msg"></p>
 
                <button
                    class="btn btn-primary"
                    onclick="validateLogin()"
                    id="ok-btn"
                    type="button"
                >
                    OK - Validate My Details
                </button>
 
                <div
                    id="enter-btn-container"
                    style="margin-top: 16px; display: none"
                >
                    <button class="btn btn-success" onclick="performLogin()" type="button">
                        🚀 ENTER RABBIT WORLD
                    </button>
                </div>
 
                <button class="btn-shortcut" onclick="openSecretCodeModal()">
                    Secret Code
                </button>
            </div>
        </div>
 
        <!-- PAGE: HOME -->
        <div id="page-home">
            <div class="card wide">
                <div class="welcome-banner">
                    <h2 id="t-welcome">
                        Learn about Rabbit 🐰<span id="display-name"></span>
                    </h2>
                </div>
                <img
                    class="rabbit-img"
                    src="rabbit.jpg"
                    alt="Cute Rabbit"
                    onerror="
                        this.src =
                            'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Oryctolagus_cuniculus_Rcdo.jpg/480px-Oryctolagus_cuniculus_Rcdo.jpg'
                    "
                />
                <div id="voice-bar" class="voice-bar off">
                    <div class="pulse-dot"></div>
                    <span id="t-voice-status">Voice is off</span>
                </div>
                <div class="info-grid">
                    <div class="info-card">
                        <div class="ic-title" id="t-diet-title">
                            🥕 Diet & Behavior
                        </div>
                        <p id="t-diet"></p>
                    </div>
                    <div class="info-card">
                        <div class="ic-title" id="t-bio-title">🧬 Biology</div>
                        <p id="t-bio"></p>
                    </div>
                    <div class="info-card">
                        <div class="ic-title" id="t-breed-title">
                            🍼 Breeding
                        </div>
                        <p id="t-breed"></p>
                    </div>
                    <div class="info-card">
                        <div class="ic-title" id="t-hab-title">🏠 Habitat</div>
                        <p id="t-hab"></p>
                    </div>
                    <div class="info-card" style="grid-column: span 2">
                        <div class="ic-title" id="t-dist-title">
                            🐇 Rabbit vs Hare
                        </div>
                        <p id="t-dist"></p>
                    </div>
                </div>
                <div class="btn-row">
                    <button
                        class="btn btn-mint"
                        id="voice-btn"
                        onclick="toggleVoice()"
                    >
                        🔊 <span id="t-voice-btnx">Read for me</span>
                    </button>
                    <button
                        class="btn btn-secondary"
                        onclick="showPage('page-videos')"
                    >
                        🎬 <span id="t-video-btn">Rabbit Videos</span>
                    </button>
                    <button
                        class="btn btn-primary"
                        style="
                            background: linear-gradient(
                                135deg,
                                #8b5cf6,
                                #ec4899
                            );
                        "
                        onclick="showPage('page-quiz')"
                    >
                        ❓ <span id="t-quiz-btn">Take Quiz</span>
                    </button>
                    <button
                        class="btn btn-success"
                        onclick="showPage('page-ai')"
                    >
                        🤖 AI
                    </button>
                    <button class="btn btn-danger" onclick="doLogout()">
                        🚪 <span id="t-logout">Logout</span>
                    </button>
                </div>
            </div>
        </div>
 
        <!-- PAGE: VIDEOS -->
        <div id="page-videos">
            <div class="card">
                <h2 id="t-vid-title">🎬 Rabbit Videos</h2>
                <p class="sub" id="t-vid-sub">Choose a topic to watch</p>
                <div class="video-options">
                    <a
                        class="video-option"
                        href="https://www.youtube.com/results?search_query=what+do+rabbits+eat"
                        target="_blank"
                    >
                        <div class="vo-num vo-num-1">1</div>
                        <div class="vo-text">
                            <strong id="t-v1">🥕 What Rabbits Eat</strong
                            ><span id="t-v1-sub"
                                >Diet, food & feeding habits</span
                            >
                        </div>
                    </a>
                    <a
                        class="video-option"
                        href="https://www.youtube.com/results?search_query=rabbit+farming"
                        target="_blank"
                    >
                        <div class="vo-num vo-num-2">2</div>
                        <div class="vo-text">
                            <strong id="t-v2">🌾 Rabbit Farming</strong
                            ><span id="t-v2-sub"
                                >Farming tips & techniques</span
                            >
                        </div>
                    </a>
                    <a
                        class="video-option"
                        href="https://www.youtube.com/results?search_query=what+to+feed+baby+rabbit"
                        target="_blank"
                    >
                        <div class="vo-num vo-num-3">3</div>
                        <div class="vo-text">
                            <strong id="t-v3">🍼 Feeding Baby Rabbits</strong
                            ><span id="t-v3-sub"
                                >What to feed your baby bunny</span
                            >
                        </div>
                    </a>
                </div>
                <div class="btn-row">
                    <button
                        class="btn btn-ghost"
                        onclick="showPage('page-home')"
                    >
                        ← <span id="t-back">Back to Home</span>
                    </button>
                </div>
            </div>
        </div>
 
        <!-- PAGE: QUIZ -->
        <div id="page-quiz">
            <div class="card wide">
                <h2 id="t-quiz-title">❓ Rabbit Quiz</h2>
                <p class="sub" id="t-quiz-sub">
                    Test your knowledge! (Medium Difficulty)
                </p>
 
                <div class="quiz-container" id="quiz-form">
                    <!-- Q1 -->
                    <div class="question-card">
                        <div class="q-text">
                            <span>1.</span> What is the joyful leap rabbits do
                            when they are happy called?
                        </div>
                        <div class="options-grid">
                            <label class="option-label"
                                ><input type="radio" name="q1" value="a" /> A) A
                                Hoppy</label
                            >
                            <label class="option-label"
                                ><input type="radio" name="q1" value="b" /> B) A
                                Binky</label
                            >
                            <label class="option-label"
                                ><input type="radio" name="q1" value="c" /> C) A
                                Zoomie</label
                            >
                        </div>
                    </div>
 
                    <!-- Q2 -->
                    <div class="question-card">
                        <div class="q-text">
                            <span>2.</span> Why can't rabbits eat only carrots
                            as their main diet?
                        </div>
                        <div class="options-grid">
                            <label class="option-label"
                                ><input type="radio" name="q2" value="a" /> A)
                                Carrots are too hard</label
                            >
                            <label class="option-label"
                                ><input type="radio" name="q2" value="b" /> B)
                                Carrots are high in sugar</label
                            >
                            <label class="option-label"
                                ><input type="radio" name="q2" value="c" /> C)
                                Carrots are poisonous</label
                            >
                        </div>
                    </div>
 
                    <!-- Q3 -->
                    <div class="question-card">
                        <div class="q-text">
                            <span>3.</span> What is a group of wild rabbits
                            called?
                        </div>
                        <div class="options-grid">
                            <label class="option-label"
                                ><input type="radio" name="q3" value="a" /> A) A
                                Herd</label
                            >
                            <label class="option-label"
                                ><input type="radio" name="q3" value="b" /> B) A
                                Pack</label
                            >
                            <label class="option-label"
                                ><input type="radio" name="q3" value="c" /> C) A
                                Colony</label
                            >
                        </div>
                    </div>
 
                    <!-- Q4 -->
                    <div class="question-card">
                        <div class="q-text">
                            <span>4.</span> How many degrees can a rabbit see
                            without moving its head?
                        </div>
                        <div class="options-grid">
                            <label class="option-label"
                                ><input type="radio" name="q4" value="a" /> A)
                                180°</label
                            >
                            <label class="option-label"
                                ><input type="radio" name="q4" value="b" /> B)
                                270°</label
                            >
                            <label class="option-label"
                                ><input type="radio" name="q4" value="c" /> C)
                                Nearly 360°</label
                            >
                        </div>
                    </div>
 
                    <!-- Q5 -->
                    <div class="question-card">
                        <div class="q-text">
                            <span>5.</span> What is the unique thing about baby
                            hares compared to baby rabbits?
                        </div>
                        <div class="options-grid">
                            <label class="option-label"
                                ><input type="radio" name="q5" value="a" /> A)
                                They are born with fur and open eyes</label
                            >
                            <label class="option-label"
                                ><input type="radio" name="q5" value="b" /> B)
                                They are born smaller</label
                            >
                            <label class="option-label"
                                ><input type="radio" name="q5" value="c" /> C)
                                They cannot jump</label
                            >
                        </div>
                    </div>
 
                    <div class="btn-row">
                        <button class="btn btn-primary" onclick="checkQuiz()">
                            ✅ Submit Answers
                        </button>
                        <button
                            class="btn btn-ghost"
                            onclick="showPage('page-home')"
                        >
                            ← Cancel
                        </button>
                    </div>
                </div>
 
                <!-- RESULT BOX -->
                <div id="quiz-result" class="result-box">
                    <h3>Quiz Complete! 🐰</h3>
                    <div class="score-big" id="score-display">0/5</div>
                    <p class="score-msg" id="score-message">Good try!</p>
                    <div class="btn-row">
                        <button
                            class="btn btn-share"
                            onclick="openShareModal()"
                        >
                            📤 Share Score
                        </button>
                        <button class="btn btn-secondary" onclick="resetQuiz()">
                            🔄 Try Again
                        </button>
                        <button
                            class="btn btn-ghost"
                            onclick="showPage('page-home')"
                        >
                            🏠 Back Home
                        </button>
                    </div>
                </div>
            </div>
        </div>
 
        <!-- PAGE: AI -->
        <div id="page-ai">
            <div class="card">
                <h2>🤖 AI Assistant</h2>
                <p class="sub">
                    What do you want to learn about? Are you want to learn about
                    Rabbit or this website? Tell me.
                </p>
                <div class="input-group">
                    <label>Your Question</label>
                    <input
                        id="ai-input"
                        type="text"
                        placeholder="Ask about rabbits or the website..."
                    />
                </div>
                <button class="btn btn-primary" onclick="askAI()">
                    Ask AI
                </button>
                <div id="ai-response" class="ai-response"></div>
                <div class="btn-row">
                    <button
                        class="btn btn-ghost"
                        onclick="showPage('page-home')"
                    >
                        🏠 Back Home
                    </button>
                </div>
            </div>
        </div>
 
        <!-- SECRET CODE MODAL -->
        <div id="secret-code-modal" class="modal" style="display: none">
            <div class="modal-content">
                <h3>🔐 Enter Secret Code</h3>
                <p>Give me a secret code</p>
                <div class="input-group">
                    <input
                        id="secret-code-input"
                        type="password"
                        placeholder="Enter secret code..."
                        onkeypress="
                            if (event.key === 'Enter') validateSecretCode();
                        "
                    />
                </div>
                <div
                    id="secret-error"
                    style="
                        color: #ff4757;
                        font-size: 0.9rem;
                        margin-bottom: 10px;
                        display: none;
                    "
                ></div>
                <div class="btn-row">
                    <button
                        class="btn btn-primary"
                        onclick="validateSecretCode()"
                    >
                        Submit
                    </button>
                    <button
                        class="btn btn-ghost"
                        onclick="closeSecretCodeModal()"
                    >
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </body>
</html>
